<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Dwi Mayu Sekeluarga</title>
    <style>
        :root {
            --primary-orange: #FF8C00;
            --soft-gold: #FFD700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #0f0f0f;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Background image dengan overlay gelap */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('background.jpg') no-repeat center center/cover;
            filter: brightness(0.4);
            z-index: -1;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            color: white;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeInScale 1.5s ease-out;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .icon-moon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 2.2rem;
            margin: 10px 0;
            background: linear-gradient(to right, var(--soft-gold), var(--primary-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .from-text {
            font-size: 1.1rem;
            margin-top: 25px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
        }

        .btn-play {
            margin-top: 30px;
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            background: var(--primary-orange);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-play:hover { transform: scale(1.1); background: var(--soft-gold); }

        /* Canvas untuk partikel bintang */
        #starCanvas { position: fixed; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <div class="bg-overlay"></div>

    <div class="card">
        <div class="icon-moon">🌙</div>
        <p style="letter-spacing: 3px;">SELAMAT HARI RAYA</p>
        <h1>Idul Fitri 1447 H</h1>
        <p style="opacity: 0.8; line-height: 1.6;">
            "Semoga keberkahan dan kebahagiaan menyertai setiap langkah kita di hari yang suci ini."
        </p>
        
        <div class="from-text">
            Dwi Mayu Sekeluarga
        </div>

        <button class="btn-play" onclick="toggleMusic()">🎵 Putar Musik</button>
    </div>

    <audio id="eidMusic" loop>
        <source src="musik-raya.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Musik Toggle
        const music = document.getElementById("eidMusic");
        function toggleMusic() {
            if (music.paused) { music.play(); } else { music.pause(); }
        }

        // Animasi Partikel Bintang
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
